<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Proveedor - MedicColombia')}"></head>

<body class="toggled">
    <header th:replace="~{fragments/header :: header}"></header>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: menu}"></div>

        <div id="page-content-wrapper">
            <main class="container-fluid p-4 my-5">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark mb-0">
                        <i
                            th:class="${modoEdicion} ? 'fa-solid fa-pen me-2 text-primary' : 'fa-solid fa-plus me-2 text-success'"></i>
                        <span th:text="${modoEdicion} ? 'Editar Proveedor' : 'Registrar Nuevo Proveedor'"></span>
                    </h2>
                    <a th:href="@{/proveedores}" class="btn btn-outline-secondary btn-sm">
                        <i class="fa-solid fa-arrow-left me-1"></i> <span class="d-none d-sm-inline ms-1">Volver</span>
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-12 col-lg-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white border-bottom fw-bold">
                                <i class="fa-solid fa-building me-2 text-secondary"></i>Datos del Proveedor
                            </div>
                            <div class="card-body p-4">

                                <input type="hidden" id="proveedorId" th:value="${modoEdicion} ? ${proveedor.id} : ''">
                                <input type="hidden" id="esModoEdicion" th:value="${modoEdicion}">

                                <div class="mb-4">
                                    <label class="form-label fw-bold">
                                        Nombre del proveedor <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-building"></i>
                                        </span>
                                        <input type="text" id="nombreProv" class="form-control"
                                            th:value="${modoEdicion} ? ${proveedor.nombreProv} : ''" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">
                                        NIT <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-id-card"></i>
                                        </span>
                                        <input type="text" id="nit" class="form-control"
                                            th:value="${modoEdicion} ? ${proveedor.nit} : ''" required>
                                    </div>
                                    <div class="form-text">El NIT debe ser único en el sistema.</div>
                                </div>

                                <div id="alertaError" class="alert alert-danger d-none py-2">
                                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                                    <span id="mensajeError"></span>
                                </div>
                                <div id="alertaExito" class="alert alert-success d-none py-2">
                                    <i class="fa-solid fa-circle-check me-2"></i>
                                    <span id="mensajeExito"></span>
                                </div>

                                <div class="d-flex gap-2 mt-4">
                                    <button type="button" id="btnGuardar" class="btn btn-outline-primary  flex-fill"
                                        onclick="guardarProveedor()">
                                        <i class="fa-solid fa-floppy-disk me-2"></i>
                                        <span
                                            th:text="${modoEdicion} ? 'Guardar Cambios' : 'Registrar Proveedor'"></span>
                                    </button>
                                    <a th:href="@{/proveedores}" class="btn btn-outline-secondary">Cancelar</a>
                                </div>

                                <div class="alert alert-info mt-4 mb-0 py-2" th:if="${modoEdicion}">
                                    <i class="fa-solid fa-circle-info me-2"></i>
                                    Para gestionar contacto y productos,
                                    <a th:href="@{'/proveedores/' + ${proveedor.id}}" class="alert-link">ve al detalle
                                        del proveedor</a>.
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:replace="~{fragments/scripts :: scripts}"></script>

    <script th:src="@{/js/proveedor/guardarProveedor.js}"></script>

    <script>

        function mostrarError(msg) {
            document.getElementById('mensajeError').textContent = msg;
            document.getElementById('alertaError').classList.remove('d-none');
            document.getElementById('alertaExito').classList.add('d-none');
        }
        function mostrarExito(msg) {
            document.getElementById('mensajeExito').textContent = msg;
            document.getElementById('alertaExito').classList.remove('d-none');
            document.getElementById('alertaError').classList.add('d-none');
        }
    </script>
</body>

</html>
