<div th:fragment="modalConfirmacion" role="banner">
    <!-- MODAL DE CONFIRMACIÓN GENÉRICO - Ponerlo en fragments/modal.html o al final del body -->
    <div class="modal fade" id="modalConfirmacionGlobal" tabindex="-1" aria-labelledby="modalConfirmacionGlobalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <!-- Header dinámico -->
                <div class="modal-header" id="modalGlobalHeader">
                    <h5 class="modal-title" id="modalConfirmacionGlobalLabel">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        Confirmar acción
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Body dinámico -->
                <div class="modal-body" id="modalGlobalBody">
                    ¿Estás seguro de realizar esta acción?
                </div>

                <!-- Footer dinámico -->
                <div class="modal-footer" id="modalGlobalFooter">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
                        <i class="fa-solid fa-times me-1"></i>Cancelar
                    </button>
                    <button type="button" class="btn btn-danger btn-sm" id="btnConfirmarGlobal">
                        <i class="fa-solid fa-check me-1"></i>Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
