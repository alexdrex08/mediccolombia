<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Parámetros del Sistema - MedicColombia')}"></head>

<body class="toggled">
    <header th:replace="~{fragments/header :: header}"></header>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: menu}"></div>
        <div id="page-content-wrapper">
            <main class="container-fluid p-4 my-5">

                <!-- ENCABEZADO -->
                <div
                    class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-0">
                            <i class="fa-solid fa-gear text-primary me-2"></i>Parámetros del Sistema
                        </h2>
                        <p class="text-muted small mt-1 mb-0">
                            <span th:text="${totalParams}"></span> parámetros ·
                            <span th:if="${esAdmin}" class="text-success fw-semibold">
                                <i class="fa-solid fa-unlock me-1"></i>Modo edición (ADMIN)
                            </span>
                            <span th:unless="${esAdmin}" class="text-warning fw-semibold">
                                <i class="fa-solid fa-lock me-1"></i>Solo lectura
                            </span>
                        </p>
                    </div>
                    <div th:if="${esAdmin}" class="mt-2 mt-md-0">
                        <a th:href="@{/configuracion/sistema}" class="btn btn-outline-secondary btn-sm">
                            <i class="fa-solid fa-rotate-left me-0 me-sm-1"></i><span
                                class="d-none d-sm-inline ms-1">Descartar cambios</span>
                        </a>
                    </div>
                </div>

                <!-- FLASH -->
                <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show shadow-sm">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <span th:text="${mensaje}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/configuracion/sistema}" method="post">

                    <!-- TARJETAS COLAPSABLES POR CATEGORÍA -->
                    <div th:each="cat : ${categorias}" class="card shadow-sm border-0 mb-3">
                        <!-- HEADER CLICKEABLE -->
                        <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center"
                            style="cursor: pointer;"
                            th:attr="data-bs-toggle='collapse', data-bs-target='#collapse-' + ${cat}, aria-expanded='false'">
                            <h6 class="fw-bold mb-0">
                                <span th:switch="${cat}">
                                    <i th:case="'SISTEMA'" class="fa-solid fa-server text-primary me-2"></i>
                                    <i th:case="'INVENTARIO'" class="fa-solid fa-boxes-stacked text-success me-2"></i>
                                    <i th:case="'FACTURACION'" class="fa-solid fa-receipt text-warning me-2"></i>
                                    <i th:case="'INTERFAZ'" class="fa-solid fa-display text-info me-2"></i>
                                    <i th:case="*" class="fa-solid fa-shield-halved text-secondary me-2"></i>
                                </span>
                                <span th:text="${cat}"></span>
                            </h6>
                            <div>
                                <span class="badge bg-light text-dark border me-2">
                                    <span th:text="${totalPorCategoria.get(cat)}"></span> parámetros
                                </span>
                                <i class="fa-solid fa-chevron-down text-muted" th:id="'icon-' + ${cat}"
                                    style="transition: transform 0.3s ease;"></i>
                            </div>
                        </div>

                        <!-- CUERPO COLAPSABLE -->
                        <div th:id="'collapse-' + ${cat}" class="collapse">
                            <div class="card-body table-wrapper table-rounded pt-0">
                                <div class="table-responsive-premium">
                                    <table class="table table-premium align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-4" style="width:220px;">Clave</th>
                                                <th style="width:280px;">Valor</th>
                                                <th>Descripción</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="confg : ${configuraciones}" th:if="${confg.categoria == cat}">
                                                <td class="ps-4">
                                                    <code class="small text-primary" th:text="${confg.clave}"></code>
                                                </td>
                                                <td>
                                                    <input th:if="${esAdmin}" type="text"
                                                        class="form-control form-control-sm"
                                                        th:name="'clave_' + ${confg.clave}" th:value="${confg.valor}">
                                                    <span th:unless="${esAdmin}" class="fw-semibold"
                                                        th:text="${confg.valor}"></span>
                                                </td>
                                                <td class="text-muted small" th:text="${confg.descripcion}"></td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(configuraciones)}">
                                                <td colspan="3" class="text-center text-muted py-3">
                                                    <i class="fa-solid fa-inbox me-2"></i>No hay parámetros en esta
                                                    categoría
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${esAdmin}" class="d-flex justify-content-end gap-2 mt-3">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fa-solid fa-floppy-disk me-0 me-sm-1"></i><span
                                class="d-none d-sm-inline ms-1">Guardar todos los cambios</span>
                        </button>
                    </div>

                </form>

            </main>
        </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:replace="~{fragments/scripts :: scripts}"></script>

    <link rel="stylesheet" th:href="@{/css/tarjetas.css}">

    <script th:src="@{/js/configuracion/rotate.js}"></script>

</body>

</html>
