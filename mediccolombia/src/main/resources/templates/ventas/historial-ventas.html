<!DOCTYPE html>
<html lang="es">

<head th:replace="~{fragments/head :: head(titulo='Historial de Ventas - MedicColombia')}"></head>

<body class="toggled">
    <header th:replace="~{fragments/header :: header}"></header>

    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: menu}"></div>

        <div id="page-content-wrapper">
            <main class="container-fluid p-4 my-5">

                <!-- ENCABEZADO -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark mb-0">
                        <i class="fa-solid fa-receipt me-2 text-primary"></i>Historial de Ventas
                    </h2>
                    <a th:href="@{/ventas/nueva-venta}" class="btn btn-success">
                        <i class="fa-solid fa-plus me-0 me-sm-1"></i>
                        <span class="d-none d-sm-inline ms-1">
                            Nueva Venta
                        </span>
                    </a>
                </div>

                <!-- TARJETAS DE RESUMEN -->
                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center">
                                <i class="fa-solid fa-money-bill-wave text-success fs-1 me-3"></i>
                                <div>
                                    <h5 class="fw-bold mb-1">Total vendido hoy</h5>
                                    <p class="text-muted small mb-0">$ <span th:text="${totalHoy} ?: '—'"></span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center">
                                <i class="fa-solid fa-cart-shopping text-primary fs-1 me-3"></i>
                                <div>
                                    <h5 class="fw-bold mb-1">Ventas del día</h5>
                                    <p class="text-muted small mb-0"><span th:text="${cantidadVentasHoy} ?: '—'"></span>
                                        transacciones</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center">
                                <i class="fa-solid fa-star text-warning fs-1 me-3"></i>
                                <div>
                                    <h5 class="fw-bold mb-1">Producto más vendido</h5>
                                    <p class="text-muted small mb-0" th:text="${masVendido} ?: '—'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FILTROS -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Buscar por cliente o ID</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                                    <input type="text" id="filtroBuscar" class="form-control"
                                        placeholder="Nombre del cliente o ID venta...">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small">Medio de pago</label>
                                <select id="filtroMedioPago" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="EFECTIVO">Efectivo</option>
                                    <option value="TARJETA">Tarjeta</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small">Fecha</label>
                                <input type="date" id="filtroFecha" class="form-control">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button id="limpiarFiltros" class="btn btn-outline-secondary w-100">
                                    <i class="fa-solid fa-rotate-left me-1"></i> Limpiar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABLA DE VENTAS -->
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">
                        <i class="fa-solid fa-list me-2 text-secondary"></i>Ventas registradas
                    </div>
                    <div class="card-body table-wrapper table-rounded">
                        <div class="table-responsive-premium">
                            <table class="table table-premium">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3" style="width:40px;">#</th>
                                        <th>Cliente</th>
                                        <th>Fecha</th>
                                        <th class="text-center">Medio de pago</th>
                                        <th class="text-end">Total</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaVentas">
                                    <tr th:each="v : ${ventas}" th:if="${ventas != null and !#lists.isEmpty(ventas)}"
                                        th:attr="data-nombre=${#strings.toLowerCase(v.nombreCliente != null ? v.nombreCliente : '')}, 
                                                data-tipo=${v.medioPago},
                                                data-fecha=${#temporals.format(v.fechaVenta, 'yyyy-MM-dd')}">
                                        <td class="fw-bold">#<span th:text="${v.id}"></span></td>
                                        <td class="fw-semibold" th:text="${v.nombreCliente} ?: 'Cliente eliminado'"></td>
                                        <td>
                                            <span class="badge bg-light text-dark border small" 
                                            th:text="${#temporals.format(v.fechaVenta, 'dd/MM/yyyy HH:mm')}"></span>
                                        </td>
                                        <td class="text-center">
                                            <span th:if="${v.medioPago == 'EFECTIVO'}" class="badge bg-success">
                                                <i class="fa-solid fa-money-bill-wave me-1"></i>Efectivo
                                            </span>
                                            <span th:if="${v.medioPago == 'TARJETA'}" class="badge bg-primary">
                                                <i class="fa-solid fa-credit-card me-1"></i>Tarjeta
                                            </span>
                                        </td>
                                        <td class="text-end fw-bold">
                                            $ <span
                                                th:text="${#numbers.formatDecimal(v.totalVenta, 0, 'COMMA', 0, 'POINT')}"></span>
                                        </td>
                                        <td class="text-center">
                                            <a th:href="@{'/ventas/' + ${v.id}}" class="btn btn-sm btn-outline-primary">
                                                <i class="fa-solid fa-eye"></i>
                                            </a>
                                        </td>
                                    </tr>

                                    <!-- Fila vacía si no hay ventas -->
                                    <tr th:if="${ventas == null or #lists.isEmpty(ventas)}">
                                        <td colspan="6" class="text-center text-muted py-4">
                                            <i class="fa-solid fa-receipt me-2"></i>
                                            No hay ventas registradas aún
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <!-- Paginación -->
                    <div class="card-footer bg-white">
                        <nav>
                            <ul id="paginacion" class="pagination-premium"></ul>
                        </nav>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:replace="~{fragments/scripts :: scripts}"></script>

    <link rel="stylesheet" th:href="@{/css/paginacion.css}">

    <script th:src="@{/js/general/paginacion.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            inicializarPaginacionYBusqueda({
                tablaId: 'tablaVentas',
                paginacionId: 'paginacion',
                inputId: 'filtroBuscar',
                filtrosSelect: [
                    { id: 'filtroMedioPago', attr: 'tipo' }
                ],
                btnLimpiarId: 'limpiarFiltros',
                inputsAdicional: ['filtroFecha'], 
                inputsLimpiar: ['filtroFecha'],  
                filasPorPagina: 5,
                filtroAdicional: function (fila) {
                    const fechaSeleccionada = document.getElementById('filtroFecha').value;
                    const fechaFila = fila.dataset.fecha; 
                    if (fechaSeleccionada && fechaFila) {
                        return fechaFila === fechaSeleccionada;
                    }
                    return true;
                }
            });

        });
    </script>

</body>

</html>
