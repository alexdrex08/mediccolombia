<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Cliente - MedicColombia')}"></head>

<body class="toggled">
    <header th:replace="~{fragments/header :: header}"></header>
    <div class="d-flex" id="wrapper">
        <div th:replace="~{fragments/sidebar :: menu}"></div>

        <div id="page-content-wrapper">
            <main class="container-fluid p-4 my-5">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark mb-0">
                        <i
                            th:class="${modoEdicion} ? 'fa-solid fa-user-pen me-2 text-primary' : 'fa-solid fa-user-plus me-2 text-success'"></i>
                        <span th:text="${modoEdicion} ? 'Editar Cliente' : 'Registrar Nuevo Cliente'"></span>
                    </h2>
                    <a th:href="@{/clientes}" class="btn btn-outline-secondary btn-sm">
                        <i class="fa-solid fa-arrow-left me-1"></i> 
                        <span class="d-none d-sm-inline ms-1">
                            Volver a Clientes
                        </span>
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-12 col-lg-6">

                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white border-bottom fw-bold">
                                <i class="fa-solid fa-user me-2 text-secondary"></i>Datos del Cliente
                            </div>
                            <div class="card-body p-4">

                                <!-- Campos ocultos para el JS -->
                                <input type="hidden" id="clienteId" th:value="${modoEdicion} ? ${cliente.id} : ''">
                                <input type="hidden" id="esModoEdicion" th:value="${modoEdicion}">

                                <div class="mb-4">
                                    <label class="form-label fw-bold">
                                        Nombre completo <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-user"></i>
                                        </span>
                                        <input type="text" id="nombreCliente" class="form-control"
                                            th:value="${modoEdicion} ? ${cliente.nombreCliente} : ''" required>
                                    </div>
                                    <div class="form-text">
                                        Nombre completo tal como aparece en el documento.
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">
                                        Número de Identificación <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-id-card"></i>
                                        </span>
                                        <input type="text" id="identificacion" class="form-control"
                                            th:value="${modoEdicion} ? ${cliente.identificacion} : ''" required>
                                    </div>
                                    <div class="form-text">
                                        Cédula, NIT o pasaporte.
                                    </div>
                                </div>

                                <!-- Mensajes -->
                                <div id="alertaError" class="alert alert-danger d-none py-2">
                                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                                    <span id="mensajeError"></span>
                                </div>
                                <div id="alertaExito" class="alert alert-success d-none py-2">
                                    <i class="fa-solid fa-circle-check me-2"></i>
                                    <span id="mensajeExito"></span>
                                </div>

                                <!-- Botones -->
                                <div class="d-flex gap-2 mt-4">
                                    <button type="button" id="btnGuardar" class="btn btn-outline-primary  flex-fill"
                                        onclick="guardarCliente()">
                                        <i class="fa-solid fa-floppy-disk me-2"></i>
                                        <span th:text="${modoEdicion} ? 'Guardar Cambios' : 'Registrar Cliente'"></span>
                                    </button>
                                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">
                                        Cancelar
                                    </a>
                                </div>

                                <!-- Nota modo edición -->
                                <div class="alert alert-info mt-4 mb-0 py-2" th:if="${modoEdicion}">
                                    <i class="fa-solid fa-circle-info me-2"></i>
                                    Para gestionar correos, teléfonos y direcciones,
                                    <a th:href="@{'/clientes/' + ${cliente.id}}" class="alert-link">ve al detalle del
                                        cliente</a>.
                                </div>

                            </div>
                        </div>

                    </div>
                </div>

            </main>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:replace="~{fragments/scripts :: scripts}"></script>

    <script th:src="@{/js/cliente/guardarCliente.js}"></script>

    <script>
        function mostrarError(msg) {
            document.getElementById('mensajeError').textContent = msg;
            document.getElementById('alertaError').classList.remove('d-none');
            document.getElementById('alertaExito').classList.add('d-none');
        }
        function mostrarExito(msg) {
            document.getElementById('mensajeExito').textContent = msg;
            document.getElementById('alertaExito').classList.remove('d-none');
            document.getElementById('alertaError').classList.add('d-none');
        }
    </script>
</body>

</html>
