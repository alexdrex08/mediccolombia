<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link th:href="@{/css/login.css}" rel="stylesheet">
    <title>Iniciar Sesión - Asuras Col</title>
</head>

<body>
    <div class="login-container">

        <!-- FORMULARIO -->
        <div class="login-form">
            <div class="card shadow-sm p-4" style="width:100%; max-width:400px;">

                <div class="text-center mb-4">
                    <img th:src="@{/img/logo_prototipo.png}" alt="Logo" style="max-width:70px;">
                    <h4 class="fw-bold mt-2">Asuras Col</h4>
                    <p class="text-muted small">Accede a tu panel de gestión</p>
                </div>
                <div th:if="${param.error}" class="alert alert-danger py-2 mb-3">

                    <i class="fa-solid fa-circle-exclamation me-2"></i>

                    Correo o contraseña incorrectos.

                </div>

                <div th:if="${param.logout}" class="alert alert-success py-2 mb-3">

                    <i class="fa-solid fa-circle-check me-2"></i>

                    Has cerrado sesión correctamente.

                </div>

                <form th:action="@{/login}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" name="correo" class="form-control" placeholder="alguien@gmail.com"
                                th:value="${correoAnterior}" required autofocus>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" name="contrasena" id="inputContrasena" class="form-control"
                                placeholder="••••••••" required>
                            <button type="button" class="btn btn-outline-secondary"
                                onclick="toggleContrasena('inputContrasena', this)" title="Mostrar/ocultar contraseña">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="recordar" name="recordar">
                            <label class="form-check-label small" for="recordar">Recordarme</label>
                        </div>
                        <a th:href="@{/auth/recuperar}" class="small text-decoration-none">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>Iniciar sesión
                    </button>

                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">¿No tienes cuenta?</small>
                    <a th:href="@{/auth/register}" class="text-decoration-none ms-1">Regístrate</a>
                </div>

            </div>
        </div>

        <!-- BANNER -->
        <div class="banner position-relative">
            <div class="banner-content">
                <img th:src="@{/img/logo_prototipo.png}" alt="Logo" style="max-width:100px;" class="mb-3">
                <h2 class="fw-bold">Asuras Col</h2>
                <p class="lead fst-italic">"Control y confianza en cada registro"</p>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle de mostrar/ocultar contraseña — reutilizable para todos los campos
        function toggleContrasena(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
