spring.application.name=mediccolombia
server.port=9090
logging.pattern.dateformat=hh:mm
spring.main.banner-mode=off


spring.thymeleaf.cache=false

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML



# Logging completo para Thymeleaf
logging.level.org.thymeleaf=TRACE
logging.level.org.thymeleaf.TemplateEngine=TRACE
logging.level.org.thymeleaf.TemplateRepository=TRACE
logging.level.org.thymeleaf.engine=TRACE

# También para Spring

logging.level.org.springframework.web=TRACE
logging.level.org.springframework.web.servlet=TRACE

#Mysql Connector 
spring.messages.basename=messages
spring.messages.encoding=UTF-8




spring.datasource.url=jdbc:mysql://localhost:3306/inventario_medicamentos?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.enable_lazy_load_no_transformation=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
